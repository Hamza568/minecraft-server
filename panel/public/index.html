<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MC Panel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface2:    #21262d;
      --border:      #30363d;
      --accent:      #3fb950;
      --accent-dim:  #1a3d27;
      --text:        #e6edf3;
      --muted:       #8b949e;
      --red:         #f85149;
      --yellow:      #d29922;
      --blue:        #58a6ff;
      --radius:      6px;
      --mono:        'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px; overflow: hidden; }

    /* ── App shell ── */
    .app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px; height: 52px; flex-shrink: 0;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .brand { font-weight: 700; font-size: 15px; color: var(--accent); white-space: nowrap; }

    .tabs { display: flex; gap: 2px; }
    .tab-btn {
      padding: 5px 14px; background: transparent;
      border: 1px solid transparent; border-radius: var(--radius);
      color: var(--muted); cursor: pointer; font-size: 13px; transition: all .15s;
    }
    .tab-btn:hover { color: var(--text); background: var(--surface2); }
    .tab-btn.active { color: var(--text); background: var(--surface2); border-color: var(--border); }

    .spacer { flex: 1; }

    .controls { display: flex; align-items: center; gap: 8px; }

    .status-badge {
      padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
      background: var(--surface2); color: var(--muted); border: 1px solid var(--border);
      transition: all .3s; white-space: nowrap;
    }
    .status-badge.online   { background: var(--accent-dim); color: var(--accent); border-color: #2a6b3a; }
    .status-badge.starting,
    .status-badge.stopping { background: #2e2a14; color: var(--yellow); border-color: #5a4c1c; }

    button {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text); cursor: pointer; font-size: 13px; transition: all .15s;
      white-space: nowrap;
    }
    button:hover:not(:disabled) { background: var(--border); }
    button:disabled { opacity: .35; cursor: default; }
    button.primary { background: var(--accent-dim); border-color: #2a6b3a; color: var(--accent); }
    button.primary:hover:not(:disabled) { background: #22503a; }
    button.danger  { background: #2d1717; border-color: #6e2a2a; color: var(--red); }
    button.danger:hover:not(:disabled)  { background: #3d1f1f; }
    button.sm { padding: 3px 8px; font-size: 12px; }

    /* ── Content area ── */
    .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .tab-pane { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .tab-pane.active { display: flex; }

    /* ── Console ── */
    #console-out {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      font-family: var(--mono); font-size: 13px; line-height: 1.65;
    }
    .log-line { white-space: pre-wrap; word-break: break-all; }
    .log-info  { color: #c9d1d9; }
    .log-warn  { color: var(--yellow); }
    .log-error { color: var(--red); }
    .log-fatal { color: var(--red); font-weight: bold; }
    .log-cmd   { color: var(--blue); }
    .log-panel { color: #6bdb7a; opacity: .85; }

    .console-bar {
      display: flex; gap: 8px; padding: 10px 16px; flex-shrink: 0;
      background: var(--surface); border-top: 1px solid var(--border);
    }
    .console-bar input {
      flex: 1; padding: 7px 12px; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: var(--mono); font-size: 13px; outline: none;
    }
    .console-bar input:focus { border-color: var(--accent); }

    /* ── Files toolbar ── */
    .file-bar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 10px 16px; flex-shrink: 0;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .breadcrumb {
      display: flex; align-items: center; gap: 3px; flex: 1; flex-wrap: wrap; font-size: 13px;
    }
    .bc-part { color: var(--muted); cursor: pointer; padding: 2px 5px; border-radius: 4px; }
    .bc-part:hover { color: var(--text); background: var(--surface2); }
    .bc-part.last { color: var(--text); cursor: default; }
    .bc-sep  { color: var(--border); user-select: none; }
    .file-acts-bar { display: flex; gap: 6px; }

    /* ── File list ── */
    #file-list { flex: 1; overflow-y: auto; }

    .file-table { width: 100%; border-collapse: collapse; }
    .file-table th {
      text-align: left; padding: 8px 12px; font-size: 12px;
      color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 500;
      position: sticky; top: 0; background: var(--bg);
    }
    .file-table td { padding: 5px 12px; border-bottom: 1px solid #191e26; }
    .file-table tr:last-child td { border-bottom: none; }
    .file-table tr:hover td { background: var(--surface2); }

    .file-name-cell { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .file-name-cell .fname { font-size: 13px; }
    .file-name-cell:hover .fname { color: var(--blue); }
    .ficon { font-size: 15px; flex-shrink: 0; }

    .fcell-muted { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .row-acts { display: flex; gap: 4px; }

    .drop-zone {
      margin: 12px; border: 2px dashed var(--border); border-radius: var(--radius);
      padding: 28px; text-align: center; color: var(--muted); transition: all .2s;
      font-size: 13px; cursor: default;
    }
    .drop-zone.drag-over { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    /* ── Editor overlay ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75);
      display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
    .overlay.hidden { display: none; }

    .editor-box {
      display: flex; flex-direction: column;
      width: 100%; max-width: 920px; height: 80vh;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      overflow: hidden;
    }
    .editor-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: var(--surface2); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .editor-path { font-family: var(--mono); font-size: 12px; color: var(--muted); }
    .editor-btns { display: flex; gap: 6px; }
    #editor-ta {
      flex: 1; width: 100%; padding: 16px; background: var(--bg); color: var(--text);
      border: none; outline: none; font-family: var(--mono); font-size: 13px;
      line-height: 1.65; resize: none; tab-size: 2;
    }

    /* ── Confirm modal ── */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,.75);
      display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal.hidden { display: none; }
    .modal-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 24px; max-width: 360px; width: 90%;
    }
    .modal-box h3 { margin-bottom: 10px; font-size: 15px; }
    .modal-box p  { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
    .modal-acts   { display: flex; gap: 8px; justify-content: flex-end; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 10px 20px; font-size: 13px; z-index: 200; opacity: 0;
      transition: opacity .2s; pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; }
    #toast.ok  { border-color: var(--accent); color: var(--accent); }
    #toast.err { border-color: var(--red);    color: var(--red); }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 7px; height: 7px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">⛏ MC Panel</div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="console">Console</button>
      <button class="tab-btn"        data-tab="files">Files</button>
    </div>
    <div class="spacer"></div>
    <div class="controls">
      <span class="status-badge" id="statusBadge">Offline</span>
      <button id="btnStart"   class="primary">▶ Start</button>
      <button id="btnStop"    disabled>■ Stop</button>
      <button id="btnRestart" disabled>↺ Restart</button>
    </div>
  </header>

  <div class="content">

    <!-- Console tab -->
    <div class="tab-pane active" id="paneConsole">
      <div id="console-out"></div>
      <div class="console-bar">
        <input id="cmdInput" type="text"
               placeholder="Server command (e.g. list, say hello, op username)…"
               autocomplete="off" spellcheck="false">
        <button id="btnSend">Send</button>
      </div>
    </div>

    <!-- Files tab -->
    <div class="tab-pane" id="paneFiles">
      <div class="file-bar">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="file-acts-bar">
          <button id="btnUpload">↑ Upload</button>
          <input  id="fileInput" type="file" multiple style="display:none">
          <button id="btnNewFolder">+ Folder</button>
        </div>
      </div>
      <div id="file-list"></div>
    </div>

  </div>
</div>

<!-- Editor -->
<div class="overlay hidden" id="editorOverlay">
  <div class="editor-box">
    <div class="editor-head">
      <span class="editor-path" id="editorPath"></span>
      <div class="editor-btns">
        <button id="btnSaveFile" class="primary">Save  <kbd style="opacity:.6;font-size:11px">Ctrl+S</kbd></button>
        <button id="btnCloseEditor">✕</button>
      </div>
    </div>
    <textarea id="editor-ta" spellcheck="false"></textarea>
  </div>
</div>

<!-- Delete confirm -->
<div class="modal hidden" id="confirmModal">
  <div class="modal-box">
    <h3>Confirm Delete</h3>
    <p id="confirmText"></p>
    <div class="modal-acts">
      <button id="btnConfirmNo">Cancel</button>
      <button id="btnConfirmYes" class="danger">Delete</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let wsToken     = null;
let ws          = null;
let curPath     = '';
let editingPath = null;
let deleteTarget = null;
let cmdHistory  = [];
let cmdHistIdx  = -1;

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// ─── API ──────────────────────────────────────────────────────────────────────
async function api(method, url, body) {
  const opts = { method, headers: {} };
  if (body != null) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(url, opts);
  const tok = res.headers.get('X-WS-Token');
  if (tok && !wsToken) { wsToken = tok; connectWS(); }
  if (!res.ok) {
    const j = await res.json().catch(() => ({}));
    throw new Error(j.error || res.statusText);
  }
  return res.json();
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
function connectWS() {
  if (!wsToken) return;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws?token=${wsToken}`);
  ws.onmessage = e => handleMsg(JSON.parse(e.data));
  ws.onclose   = () => { ws = null; setTimeout(connectWS, 3000); };
  ws.onerror   = () => ws?.close();
}

function handleMsg(msg) {
  if (msg.type === 'log')    addLine(msg.line);
  if (msg.type === 'init')   { clearConsole(); msg.lines.forEach(addLine); updateStatus(msg.status); }
  if (msg.type === 'status') updateStatus(msg.status);
}

// ─── Console ──────────────────────────────────────────────────────────────────
function clearConsole() { document.getElementById('console-out').innerHTML = ''; }

function lineClass(l) {
  if (l.startsWith('>'))                          return 'log-cmd';
  if (l.startsWith('[panel]'))                    return 'log-panel';
  if (/\[FATAL\]|\[FATAL\b/.test(l))             return 'log-fatal';
  if (/\[ERROR\]|\[STDERR\]|ERROR\b/.test(l))    return 'log-error';
  if (/\[WARN\]|WARN\b/.test(l))                 return 'log-warn';
  return 'log-info';
}

function addLine(line) {
  const out   = document.getElementById('console-out');
  const atBot = out.scrollHeight - out.scrollTop - out.clientHeight < 80;
  const el    = document.createElement('div');
  el.className = `log-line ${lineClass(line)}`;
  el.textContent = line;
  out.appendChild(el);
  // Cap DOM lines to prevent memory growth
  while (out.children.length > 3000) out.removeChild(out.firstChild);
  if (atBot) out.scrollTop = out.scrollHeight;
}

// ─── Status / button state ────────────────────────────────────────────────────
function updateStatus(status) {
  const labels = { offline: 'Offline', starting: 'Starting…', online: 'Online', stopping: 'Stopping…' };
  const badge  = document.getElementById('statusBadge');
  badge.textContent = labels[status] ?? status;
  badge.className   = `status-badge ${status}`;

  const idle    = status === 'offline';
  const running = status === 'online' || status === 'starting';
  const busy    = status === 'stopping';

  document.getElementById('btnStart').disabled   = !idle;
  document.getElementById('btnStop').disabled    = idle || busy;
  document.getElementById('btnRestart').disabled = idle || busy;
}

// ─── File browser ─────────────────────────────────────────────────────────────
const EXT_ICONS = {
  jar:'🔌', zip:'📦', gz:'📦', tar:'📦',
  png:'🖼', jpg:'🖼', jpeg:'🖼', gif:'🖼', webp:'🖼',
  log:'📜', txt:'📄', md:'📄',
  yml:'⚙️', yaml:'⚙️', json:'⚙️', toml:'⚙️', properties:'⚙️',
  conf:'⚙️', cfg:'⚙️', xml:'⚙️', ini:'⚙️',
  sh:'⚡', bat:'⚡', cmd:'⚡', js:'📝', ts:'📝', py:'📝',
  dat:'💾', db:'💾', sqlite:'💾', nbt:'💾',
};
const TEXT_EXTS = new Set([
  'txt','yml','yaml','json','toml','properties','conf','cfg','xml',
  'md','sh','log','ini','bat','cmd','js','ts','py','java','kt',
]);

function ficon(name, isDir) {
  if (isDir) return '📁';
  const ext = name.split('.').pop().toLowerCase();
  return EXT_ICONS[ext] ?? '📄';
}
function isText(name) { return TEXT_EXTS.has(name.split('.').pop().toLowerCase()); }
function fmtSize(b) {
  if (!b) return '—';
  if (b < 1024) return `${b} B`;
  if (b < 1048576) return `${(b/1024).toFixed(1)} KB`;
  return `${(b/1048576).toFixed(1)} MB`;
}
function fmtTime(ms) {
  if (!ms) return '—';
  const diff = Date.now() - ms;
  if (diff < 60000)    return 'just now';
  if (diff < 3600000)  return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  return new Date(ms).toLocaleDateString();
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildBreadcrumb(cwd) {
  const bc    = document.getElementById('breadcrumb');
  const parts = (cwd || '').replace(/\\/g,'/').split('/').filter(Boolean);
  bc.innerHTML = '';

  const addPart = (label, path, isLast) => {
    const span = document.createElement('span');
    span.className = `bc-part${isLast ? ' last' : ''}`;
    span.textContent = label;
    if (!isLast) span.onclick = () => navigateTo(path);
    bc.appendChild(span);
    if (!isLast) {
      const sep = document.createElement('span');
      sep.className = 'bc-sep'; sep.textContent = ' / ';
      bc.appendChild(sep);
    }
  };

  addPart('/data', '', parts.length > 0);
  parts.forEach((p, i) => addPart(p, parts.slice(0,i+1).join('/'), i === parts.length-1));
}

async function navigateTo(rel) {
  curPath = rel;
  try {
    const data = await api('GET', `/api/files?path=${encodeURIComponent(rel)}`);
    buildBreadcrumb(data.cwd);
    renderFiles(data.items, data.cwd);
  } catch (e) { toast(e.message, 'err'); }
}

function renderFiles(items, cwd) {
  const list = document.getElementById('file-list');
  list.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.style.display = 'flex';
  wrap.style.flexDirection = 'column';
  wrap.style.minHeight = '100%';
  list.appendChild(wrap);

  if (items.length === 0 && !cwd) {
    const dz = makeDZ();
    wrap.appendChild(dz);
    return;
  }

  const table = document.createElement('table');
  table.className = 'file-table';
  table.innerHTML = `<thead><tr>
    <th>Name</th><th>Size</th><th>Modified</th><th></th>
  </tr></thead>`;
  const tbody = document.createElement('tbody');
  table.appendChild(tbody);
  wrap.appendChild(table);

  // ".." row when inside a subfolder
  if (cwd && cwd !== '.') {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td colspan="4"><div class="file-name-cell">
      <span class="ficon">📁</span>
      <span class="fname" style="color:var(--muted)">..</span>
    </div></td>`;
    tr.querySelector('.file-name-cell').onclick = () => {
      const parts = curPath.replace(/\\/g,'/').split('/').filter(Boolean);
      parts.pop();
      navigateTo(parts.join('/'));
    };
    tbody.appendChild(tr);
  }

  for (const item of items) {
    const itemPath = [curPath, item.name].filter(Boolean).join('/');
    const editable = item.type === 'file' && isText(item.name);

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><div class="file-name-cell" data-path="${esc(itemPath)}" data-type="${item.type}">
        <span class="ficon">${ficon(item.name, item.type === 'dir')}</span>
        <span class="fname">${esc(item.name)}</span>
      </div></td>
      <td class="fcell-muted">${item.type === 'dir' ? '—' : fmtSize(item.size)}</td>
      <td class="fcell-muted">${fmtTime(item.mtime)}</td>
      <td><div class="row-acts">
        ${editable
          ? `<button class="sm" data-act="edit" data-path="${esc(itemPath)}">Edit</button>`
          : item.type === 'file'
            ? `<button class="sm" data-act="dl" data-path="${esc(itemPath)}">Download</button>`
            : ''}
        <button class="sm danger" data-act="del" data-path="${esc(itemPath)}" data-name="${esc(item.name)}" data-itype="${item.type}">Delete</button>
      </div></td>`;

    tr.querySelector('.file-name-cell').onclick = () => {
      if (item.type === 'dir') navigateTo(itemPath);
      else if (editable)       openEditor(itemPath, item.name);
    };
    tr.querySelectorAll('[data-act]').forEach(btn => btn.onclick = e => {
      e.stopPropagation();
      if (btn.dataset.act === 'edit') openEditor(btn.dataset.path, item.name);
      if (btn.dataset.act === 'dl')   downloadFile(btn.dataset.path, item.name);
      if (btn.dataset.act === 'del')  confirmDelete(btn.dataset.path, btn.dataset.name, btn.dataset.itype);
    });

    tbody.appendChild(tr);
  }

  const dz = makeDZ();
  wrap.appendChild(dz);
}

function makeDZ() {
  const dz = document.createElement('div');
  dz.className = 'drop-zone';
  dz.textContent = 'Drop files here to upload';
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', ()  => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
  });
  return dz;
}

// ─── File editor ──────────────────────────────────────────────────────────────
async function openEditor(filePath, name) {
  try {
    const data = await api('GET', `/api/files/content?path=${encodeURIComponent(filePath)}`);
    editingPath = filePath;
    document.getElementById('editorPath').textContent = filePath;
    document.getElementById('editor-ta').value = data.content;
    document.getElementById('editorOverlay').classList.remove('hidden');
    document.getElementById('editor-ta').focus();
  } catch (e) { toast(e.message, 'err'); }
}

async function saveEditor() {
  if (!editingPath) return;
  try {
    await api('POST', '/api/files/save', { path: editingPath, content: document.getElementById('editor-ta').value });
    toast('Saved');
  } catch (e) { toast(e.message, 'err'); }
}

function closeEditor() {
  document.getElementById('editorOverlay').classList.add('hidden');
  editingPath = null;
}

// ─── Delete ───────────────────────────────────────────────────────────────────
function confirmDelete(path, name, type) {
  deleteTarget = path;
  document.getElementById('confirmText').textContent =
    `Delete ${type === 'dir' ? 'folder' : 'file'} "${name}"? This cannot be undone.`;
  document.getElementById('confirmModal').classList.remove('hidden');
}

async function doDelete() {
  if (!deleteTarget) return;
  try {
    await api('DELETE', `/api/files?path=${encodeURIComponent(deleteTarget)}`);
    toast('Deleted');
    navigateTo(curPath);
  } catch (e) { toast(e.message, 'err'); }
  deleteTarget = null;
  document.getElementById('confirmModal').classList.add('hidden');
}

// ─── Upload ───────────────────────────────────────────────────────────────────
async function uploadFiles(files) {
  const form = new FormData();
  for (const f of files) form.append('files', f);
  try {
    const r = await fetch(`/api/files/upload?path=${encodeURIComponent(curPath)}`, { method: 'POST', body: form });
    const j = await r.json();
    toast(`Uploaded ${j.count} file(s)`);
    navigateTo(curPath);
  } catch (e) { toast(e.message, 'err'); }
}

// ─── Download ─────────────────────────────────────────────────────────────────
function downloadFile(filePath, name) {
  const a = document.createElement('a');
  a.href     = `/api/files/download?path=${encodeURIComponent(filePath)}`;
  a.download = name;
  a.click();
}

// ─── Command input ────────────────────────────────────────────────────────────
async function sendCmd() {
  const input = document.getElementById('cmdInput');
  const cmd   = input.value.trim();
  if (!cmd) return;
  if (cmdHistory[0] !== cmd) cmdHistory.unshift(cmd);
  if (cmdHistory.length > 100) cmdHistory.pop();
  cmdHistIdx = -1;
  input.value = '';
  try { await api('POST', '/api/server/command', { command: cmd }); }
  catch (e) { toast(e.message, 'err'); }
}

// ─── Event wiring ─────────────────────────────────────────────────────────────

// Tabs
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const id = 'pane' + btn.dataset.tab[0].toUpperCase() + btn.dataset.tab.slice(1);
    document.getElementById(id).classList.add('active');
    if (btn.dataset.tab === 'files') navigateTo(curPath);
  };
});

// Server buttons
document.getElementById('btnStart').onclick = async () => {
  try { await api('POST', '/api/server/start'); }
  catch (e) { toast(e.message, 'err'); }
};
document.getElementById('btnStop').onclick = async () => {
  try { await api('POST', '/api/server/stop', {}); }
  catch (e) { toast(e.message, 'err'); }
};
document.getElementById('btnRestart').onclick = async () => {
  try { toast('Restarting…'); await api('POST', '/api/server/restart'); }
  catch (e) { toast(e.message, 'err'); }
};

// Console
document.getElementById('btnSend').onclick = sendCmd;
document.getElementById('cmdInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { sendCmd(); return; }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (cmdHistIdx < cmdHistory.length - 1) e.target.value = cmdHistory[++cmdHistIdx];
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (cmdHistIdx > 0) { e.target.value = cmdHistory[--cmdHistIdx]; }
    else { cmdHistIdx = -1; e.target.value = ''; }
  }
});

// Editor
document.getElementById('btnSaveFile').onclick   = saveEditor;
document.getElementById('btnCloseEditor').onclick = closeEditor;
document.getElementById('editorOverlay').onclick  = e => {
  if (e.target === document.getElementById('editorOverlay')) closeEditor();
};
document.getElementById('editor-ta').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveEditor(); }
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = e.target, s = ta.selectionStart;
    ta.value = ta.value.slice(0, s) + '  ' + ta.value.slice(ta.selectionEnd);
    ta.selectionStart = ta.selectionEnd = s + 2;
  }
});

// Delete modal
document.getElementById('btnConfirmYes').onclick = doDelete;
document.getElementById('btnConfirmNo').onclick  = () => {
  document.getElementById('confirmModal').classList.add('hidden');
  deleteTarget = null;
};

// Upload
document.getElementById('btnUpload').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = e => {
  if (e.target.files.length) uploadFiles(e.target.files);
  e.target.value = '';
};

// New folder
document.getElementById('btnNewFolder').onclick = async () => {
  const name = prompt('Folder name:');
  if (!name?.trim()) return;
  try {
    await api('POST', '/api/files/mkdir', { path: [curPath, name.trim()].filter(Boolean).join('/') });
    navigateTo(curPath);
  } catch (e) { toast(e.message, 'err'); }
};

// ─── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  try {
    const data = await api('GET', '/api/status');
    updateStatus(data.status);
  } catch (e) { console.error('Init error:', e); }
})();
</script>
</body>
</html>
